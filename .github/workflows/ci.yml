name: W9 App CI/CD

on:
  pull_request:
    paths:
      - 'app/**'
      - 'terraform/**'
      - 'bootstrap/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'terraform/**'
      - 'bootstrap/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions: read-all

env:
  APP_DIR: app
  TF_DIR: terraform
  AWS_REGION: ap-southeast-1
  IMAGE_REPOSITORY: w9-web
  GITOPS_REPO: pho-veteran/w9-gitops
  GITOPS_FILE: workloads/web/overlays/lab/kustomization.yaml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run app tests
        working-directory: ${{ env.APP_DIR }}
        run: npm test

      - name: Build app artifact
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-test-${{ github.run_id }}

      - name: Check backend config
        run: |
          test -n "${{ vars.TF_STATE_BUCKET }}" || {
            echo "TF_STATE_BUCKET repository variable is not set"
            exit 1
          }

      - name: Terraform fmt check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform test
        working-directory: ${{ env.TF_DIR }}
        run: |
          shopt -s globstar nullglob
          test_files=(**/*.tftest.hcl *.tftest.hcl)
          if [ "${#test_files[@]}" -gt 0 ]; then
            terraform test
          else
            echo "No *.tftest.hcl files found. Skip terraform test."
          fi
        shell: bash

  publish:
    name: Build, Push, Promote
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="main-${short_sha}"
          image="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_REPOSITORY}:${tag}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.image }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Install kustomize
        run: |
          curl -sSLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.7.0/kustomize_v5.7.0_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Update GitOps image tag
        working-directory: gitops/workloads/web/overlays/lab
        run: |
          kustomize edit set image "w9-web=${{ steps.meta.outputs.image }}"

      - name: Commit and push GitOps change
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GITOPS_FILE"
          git commit -m "chore: deploy ${{ steps.meta.outputs.image }}" || exit 0
          git push

  apply:
    name: Apply Infra
    runs-on: ubuntu-latest
    needs:
      - test
      - publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-apply-${{ github.run_id }}

      - name: Check backend config
        run: |
          test -n "${{ vars.TF_STATE_BUCKET }}" || {
            echo "TF_STATE_BUCKET repository variable is not set"
            exit 1
          }

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

